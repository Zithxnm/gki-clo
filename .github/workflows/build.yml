name: Build Release Kernels

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    strategy:
      matrix:
        variant:
          - { name: "KowSU-SUSFS-Balance", su: "true", susfs: "true", freq: "Balance(250hz)", droidspaces: "false", spoof: "true" }
          - { name: "KowSU-SUSFS-Performance", su: "true", susfs: "true", freq: "Performance(500hz)", droidspaces: "false", spoof: "true" }
          - { name: "KowSU-SUSFS-Powersave", su: "true", susfs: "true", freq: "Powersave(100hz)", droidspaces: "false", spoof: "true" }
          - { name: "Vanilla-Balance", su: "false", susfs: "false", freq: "Balance(250hz)", droidspaces: "false", spoof: "false" }
          - { name: "Vanilla-Performance", su: "false", susfs: "false", freq: "Performance(500hz)", droidspaces: "false", spoof: "false" }
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3
        
    - name: Download and Extract Clang Toolchain
      run: |
        mkdir -p ../toolchains/clang
        wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android15-release/clang-r510928.tar.gz -O clang.tar.gz
        tar -xf clang.tar.gz -C ../toolchains/clang

    - name: Configure Timer Frequency
      run: |
        FREQ="${{ matrix.variant.freq }}"
        case "$FREQ" in
          "Powersave(100hz)") HZ_VAL="100"; HZ_NAME="Powersave" ;;
          "Balance(250hz)") HZ_VAL="250"; HZ_NAME="Balance" ;;
          "Smooth(300hz)") HZ_VAL="300"; HZ_NAME="Smooth" ;;
          "Performance(500hz)") HZ_VAL="500"; HZ_NAME="Performance" ;;
          "Ultra(1000hz)") HZ_VAL="1000"; HZ_NAME="Ultra" ;;
          *) HZ_VAL="250"; HZ_NAME="Balance" ;;
        esac
        echo "TIMER_NAME=$HZ_NAME" >> $GITHUB_ENV
        ./scripts/config --file arch/arm64/configs/capybara_defconfig \
          --disable HZ_100 --disable HZ_125 --disable HZ_250 \
          --disable HZ_300 --disable HZ_500 --disable HZ_1000 \
          --enable HZ_$HZ_VAL --set-val HZ $HZ_VAL

    - name: Setup KowSU
      if: ${{ matrix.variant.su == 'true' }}
      run: |
        curl -ls https://raw.githubusercontent.com/KOWX712/KernelSU/master/kernel/setup.sh | bash -s master
        echo "CONFIG_KSU=y" >> arch/arm64/configs/capybara_defconfig

    - name: Setup Droidspaces
      if: ${{ matrix.variant.droidspaces == 'true' }}
      run: |
        chmod +x droidspaces_setup.sh
        ./droidspaces_setup.sh
    - name: Setup SUSFS
      if: ${{ matrix.variant.susfs == 'true' && matrix.variant.su == 'true' }}
      run: |
        chmod +x susfs_setup.sh
        chmod +x scripts/ksu_susfs_fixup.sh
        ./susfs_setup.sh
        if [ "${{ matrix.variant.spoof }}" == "true" ]; then
          sed -i 's/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION=\"\"/g' arch/arm64/configs/capybara_defconfig
          sed -i '$a CONFIG_KSU_SUSFS_SPOOF_UNAME=y' arch/arm64/configs/capybara_defconfig
        else
          sed -i '$a # CONFIG_KSU_SUSFS_SPOOF_UNAME is not set' arch/arm64/configs/capybara_defconfig
        fi
    - name: Build Kernel
      run: |
        export PATH=$(pwd)/../toolchains/clang/bin:$PATH
        export ARCH=arm64
        export SUBARCH=arm64
        export KBUILD_COMPILER_STRING="$(clang --version | head -n 1 | perl -pe 's/\(http.*?\)//gs' | sed -e 's/  */ /g' -e 's/[[:space:]]*$//')"
        echo "Using compiler: $KBUILD_COMPILER_STRING"
        make O=out CC=clang LLVM=1 LLVM_IAS=1 KCFLAGS="-w" capybara_defconfig
        make -j$(nproc --all) O=out CC=clang LLVM=1 LLVM_IAS=1 KCFLAGS="-w"
        
    - name: Package with AnyKernel3
      run: |
        export ZIP_NAME="Capybara-CLO-Kernel-${{ matrix.variant.name }}"
        echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
        cp out/arch/arm64/boot/Image anykernel/
        cd anykernel
        zip -r9 ../$ZIP_NAME.zip *
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ZIP_NAME }}
        path: ${{ env.ZIP_NAME }}.zip

  release:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare assets
        run: |
          mkdir -p release_assets
          find artifacts -type f -name "*.zip" -exec mv {} release_assets/ \; || true

      - name: Generate Release Body
        run: |
          python3 -c "
          import os
          repo = os.environ['GITHUB_REPOSITORY']
          run_num = os.environ['GITHUB_RUN_NUMBER']
          sha = os.environ['GITHUB_SHA']
          base_url = f'https://github.com/{repo}/releases/download/build-{run_num}-{sha}'
          
          try:
              zips = [f for f in os.listdir('release_assets') if f.endswith('.zip')]
          except FileNotFoundError:
              zips = []
              
          def get_link(variant):
              for f in zips:
                  if variant in f:
                      return f'[{variant}]({base_url}/{f})'
              return '❌'
              
          with open('release_body.md', 'w') as f:
              f.write('## Capybara CLO Kernel Builds\n\n')
              f.write(f'Commit: {sha}\n\n')
              f.write('| Variant | Powersave (100Hz) | Balance (250Hz) | Performance (500Hz) |\n')
              f.write('|---|---|---|---|\n')
              f.write(f'| **Vanilla** | {get_link(\"Vanilla-Powersave\")} | {get_link(\"Vanilla-Balance\")} | {get_link(\"Vanilla-Performance\")} |\n')
              f.write(f'| **KowSU + SUSFS** | {get_link(\"KowSU-SUSFS-Powersave\")} | {get_link(\"KowSU-SUSFS-Balance\")} | {get_link(\"KowSU-SUSFS-Performance\")} |\n')
          "

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}-${{ github.sha }}
          name: Build ${{ github.sha }}
          body_path: release_body.md
          files: release_assets/*
