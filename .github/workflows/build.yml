name: Build Release Kernels

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        variant:
          # KowSU + SUSFS + Spoof + NoMount
          - { name: "KSU-SUSFS-NoMount-Powersave", su: "true", susfs: "true", freq: "Powersave(100hz)", droidspaces: "false", spoof: "true", nomount: "true" }
          - { name: "KSU-SUSFS-NoMount-Balance", su: "true", susfs: "true", freq: "Balance(250hz)", droidspaces: "false", spoof: "true", nomount: "true" }
          - { name: "KSU-SUSFS-NoMount-Smooth", su: "true", susfs: "true", freq: "Smooth(300hz)", droidspaces: "false", spoof: "true", nomount: "true" }
          - { name: "KSU-SUSFS-NoMount-Performance", su: "true", susfs: "true", freq: "Performance(500hz)", droidspaces: "false", spoof: "true", nomount: "true" }
          - { name: "KSU-SUSFS-NoMount-Ultra", su: "true", susfs: "true", freq: "Ultra(1000hz)", droidspaces: "false", spoof: "true", nomount: "true" }
          
          # Vanilla
          - { name: "Vanilla-Powersave", su: "false", susfs: "false", freq: "Powersave(100hz)", droidspaces: "false", spoof: "false", nomount: "false" }
          - { name: "Vanilla-Balance", su: "false", susfs: "false", freq: "Balance(250hz)", droidspaces: "false", spoof: "false", nomount: "false" }
          - { name: "Vanilla-Smooth", su: "false", susfs: "false", freq: "Smooth(300hz)", droidspaces: "false", spoof: "false", nomount: "false" }
          - { name: "Vanilla-Performance", su: "false", susfs: "false", freq: "Performance(500hz)", droidspaces: "false", spoof: "false", nomount: "false" }
          - { name: "Vanilla-Ultra", su: "false", susfs: "false", freq: "Ultra(1000hz)", droidspaces: "false", spoof: "false", nomount: "false" }
          
          # KowSU Root Only (Without SUSFS)
          - { name: "KSU-Powersave", su: "true", susfs: "false", freq: "Powersave(100hz)", droidspaces: "false", spoof: "false", nomount: "false" }
          - { name: "KSU-Balance", su: "true", susfs: "false", freq: "Balance(250hz)", droidspaces: "false", spoof: "false", nomount: "false" }
          - { name: "KSU-Smooth", su: "true", susfs: "false", freq: "Smooth(300hz)", droidspaces: "false", spoof: "false", nomount: "false" }
          - { name: "KSU-Performance", su: "true", susfs: "false", freq: "Performance(500hz)", droidspaces: "false", spoof: "false", nomount: "false" }
          - { name: "KSU-Ultra", su: "true", susfs: "false", freq: "Ultra(1000hz)", droidspaces: "false", spoof: "false", nomount: "false" }
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: false
        swap-storage: false

    - name: Setup ccache checkout
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: release-${{ matrix.variant.name }}
        max-size: 5G

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 zstd
        
    - name: Setup Toolchain
      run: |
        mkdir -p ../toolchains/clang
        TOOLCHAIN="neutron"
        if [ "$TOOLCHAIN" == "neutron" ]; then
          cd ../toolchains/clang
          if curl -fLO "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman" && chmod +x antman && ./antman -S && ./antman --patch=glibc; then
            echo "Neutron toolchain successfully installed"
          else
            echo "Neutron failed, falling back to zyc"
            rm -rf *
            ZYC_URL=$(curl -s https://api.github.com/repos/ZyCromerZ/Clang/releases/latest | grep "browser_download_url.*tar.gz" | cut -d '"' -f 4)
            wget -qO zyc.tar.gz "$ZYC_URL"
            BIN_PATH=$(tar -tf zyc.tar.gz | grep -m1 'bin/clang$')
            STRIP=$(($(echo "$BIN_PATH" | tr '/' '\n' | wc -l) - 2))
            [ "$STRIP" -lt 0 ] && STRIP=0
            tar -xf zyc.tar.gz --strip-components=$STRIP
          fi
        elif [ "$TOOLCHAIN" == "zyc" ]; then
          ZYC_URL=$(curl -s https://api.github.com/repos/ZyCromerZ/Clang/releases/latest | grep "browser_download_url.*tar.gz" | cut -d '"' -f 4)
          wget -qO zyc.tar.gz "$ZYC_URL"
          BIN_PATH=$(tar -tf zyc.tar.gz | grep -m1 'bin/clang$')
          STRIP=$(($(echo "$BIN_PATH" | tr '/' '\n' | wc -l) - 2))
          [ "$STRIP" -lt 0 ] && STRIP=0
          tar -xf zyc.tar.gz -C ../toolchains/clang --strip-components=$STRIP
        else
          wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android15-release/clang-r510928.tar.gz -O clang.tar.gz
          tar -xf clang.tar.gz -C ../toolchains/clang
        fi

    - name: Configure Timer Frequency
      run: |
        FREQ="${{ matrix.variant.freq }}"
        case "$FREQ" in
          "Powersave(100hz)") HZ_VAL="100"; HZ_NAME="Powersave" ;;
          "Balance(250hz)") HZ_VAL="250"; HZ_NAME="Balance" ;;
          "Smooth(300hz)") HZ_VAL="300"; HZ_NAME="Smooth" ;;
          "Performance(500hz)") HZ_VAL="500"; HZ_NAME="Performance" ;;
          "Ultra(1000hz)") HZ_VAL="1000"; HZ_NAME="Ultra" ;;
          *) HZ_VAL="250"; HZ_NAME="Balance" ;;
        esac
        echo "TIMER_NAME=$HZ_NAME" >> $GITHUB_ENV
        ./scripts/config --file arch/arm64/configs/capybara_defconfig \
          --disable HZ_100 --disable HZ_125 --disable HZ_250 \
          --disable HZ_300 --disable HZ_500 --disable HZ_1000 \
          --enable HZ_$HZ_VAL --set-val HZ $HZ_VAL

    - name: Setup KowSU
      if: ${{ matrix.variant.su == 'true' }}
      run: |
        curl -ls https://raw.githubusercontent.com/KOWX712/KernelSU/master/kernel/setup.sh | bash -s master
        echo "CONFIG_KSU=y" >> arch/arm64/configs/capybara_defconfig

    - name: Setup Droidspaces
      if: ${{ matrix.variant.droidspaces == 'true' }}
      run: |
        chmod +x droidspaces_setup.sh
        ./droidspaces_setup.sh

    - name: Setup SUSFS
      if: ${{ matrix.variant.susfs == 'true' && matrix.variant.su == 'true' }}
      run: |
        chmod +x susfs_setup.sh
        chmod +x scripts/ksu_susfs_fixup.sh
        ./susfs_setup.sh
        if [ "${{ matrix.variant.spoof }}" == "true" ]; then
          sed -i 's/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION=\"\"/g' arch/arm64/configs/capybara_defconfig
          sed -i '$a CONFIG_KSU_SUSFS_SPOOF_UNAME=y' arch/arm64/configs/capybara_defconfig
        else
          sed -i '$a # CONFIG_KSU_SUSFS_SPOOF_UNAME is not set' arch/arm64/configs/capybara_defconfig
        fi

    - name: Setup NoMount
      if: ${{ matrix.variant.nomount == 'true' }}
      run: |
        chmod +x nomount_setup.sh
        ./nomount_setup.sh
        echo "CONFIG_NOMOUNT=y" >> arch/arm64/configs/capybara_defconfig

    - name: Setup ccache script
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        INCLUDE_KERNELSU: ${{ matrix.variant.su }}
        CLANG_VARIANT: "neutron"
      run: |
        chmod +x scripts/ccache_setup.sh
        bash scripts/ccache_setup.sh

    - name: Build Kernel
      run: |
        export PATH=$(pwd)/../toolchains/clang/bin:$PATH
        export ARCH=arm64
        export SUBARCH=arm64
        export KBUILD_COMPILER_STRING="$(clang --version | head -n 1 | perl -pe 's/\(http.*?\)//gs' | sed -e 's/  */ /g' -e 's/[[:space:]]*$//')"
        echo "Using compiler: $KBUILD_COMPILER_STRING"
        make O=out CC="ccache clang" LLVM=1 LLVM_IAS=1 KCFLAGS="-w" capybara_defconfig
        make -j$(nproc --all) O=out CC="ccache clang" LLVM=1 LLVM_IAS=1 KCFLAGS="-w"
        
    - name: Save ccache script
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        chmod +x scripts/ccache_save.sh
        bash scripts/ccache_save.sh

    - name: Package with AnyKernel3
      run: |
        export ZIP_NAME="Capybara-CLO-Kernel-${{ matrix.variant.name }}"
        echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
        cp out/arch/arm64/boot/Image anykernel/
        cd anykernel
        zip -r9 ../$ZIP_NAME.zip *
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ZIP_NAME }}
        path: ${{ env.ZIP_NAME }}.zip

  release:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare assets
        run: |
          mkdir -p release_assets
          find artifacts -type f -name "*.zip" -exec mv {} release_assets/ \; || true

      - name: Generate Release Body
        run: |
          python3 -c "
          import os
          repo = os.environ['GITHUB_REPOSITORY']
          run_num = os.environ['GITHUB_RUN_NUMBER']
          sha = os.environ['GITHUB_SHA']
          base_url = f'https://github.com/{repo}/releases/download/build-{run_num}-{sha}'
          
          try:
              zips = [f for f in os.listdir('release_assets') if f.endswith('.zip')]
          except FileNotFoundError:
              zips = []
              
          def get_link(variant):
              for f in zips:
                  if variant in f:
                      return f'[Download]({base_url}/{f})'
              return '❌'
              
          with open('release_body.md', 'w') as f:
              f.write('## Capybara CLO Kernel Builds\n\n')
              f.write(f'Commit: {sha}\n\n')
              
              f.write('### KowSU + SUSFS + NoMount\n')
              f.write('| 100Hz | 250Hz | 300Hz | 500Hz | 1000Hz |\n')
              f.write('|---|---|---|---|---|\n')
              f.write(f'| {get_link(\"KSU-SUSFS-NoMount-Powersave\")} | {get_link(\"KSU-SUSFS-NoMount-Balance\")} | {get_link(\"KSU-SUSFS-NoMount-Smooth\")} | {get_link(\"KSU-SUSFS-NoMount-Performance\")} | {get_link(\"KSU-SUSFS-NoMount-Ultra\")} |\n\n')

              f.write('### KowSU (Root Only)\n')
              f.write('| 100Hz | 250Hz | 300Hz | 500Hz | 1000Hz |\n')
              f.write('|---|---|---|---|---|\n')
              f.write(f'| {get_link(\"KSU-Powersave\")} | {get_link(\"KSU-Balance\")} | {get_link(\"KSU-Smooth\")} | {get_link(\"KSU-Performance\")} | {get_link(\"KSU-Ultra\")} |\n\n')

              f.write('### Vanilla\n')
              f.write('| 100Hz | 250Hz | 300Hz | 500Hz | 1000Hz |\n')
              f.write('|---|---|---|---|---|\n')
              f.write(f'| {get_link("Vanilla-Powersave")} | {get_link("Vanilla-Balance")} | {get_link("Vanilla-Smooth")} | {get_link("Vanilla-Performance")} | {get_link("Vanilla-Ultra")} |\n\n')
          "

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}-${{ github.sha }}
          name: Build ${{ github.sha }}
          body_path: release_body.md
          files: release_assets/*
