name: Build Custom Kernel

on:
  workflow_dispatch:
    inputs:
      include_kernelsu:
        description: 'Build with KowSU (KOWX712)'
        required: true
        type: boolean
        default: false
      include_droidspaces:
        description: 'Build with Droidspaces Support'
        required: true
        type: boolean
        default: false
      include_susfs:
        description: 'Build with SUSFS Support'
        required: true
        type: boolean
        default: false
      include_susfs_spoof_uname:
        description: 'Enable SUSFS Uname Spoofing'
        required: true
        type: boolean
        default: false
      timer_frequency:
        description: 'Timer Frequency'
        required: true
        type: choice
        options:
          - Powersave(100hz)
          - Balance(250hz)
          - Smooth(300hz)
          - Performance(500hz)
          - Ultra(1000hz)
        default: 'Balance(250hz)'
jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3
        
    - name: Download and Extract Clang Toolchain
      run: |
        mkdir -p ../toolchains/clang
        wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android15-release/clang-r510928.tar.gz -O clang.tar.gz
        tar -xf clang.tar.gz -C ../toolchains/clang

    - name: Configure Timer Frequency
      run: |
        FREQ="${{ github.event.inputs.timer_frequency }}"
        case "$FREQ" in
          "Powersave(100hz)") HZ_VAL="100"; HZ_NAME="Powersave" ;;
          "Balance(250hz)") HZ_VAL="250"; HZ_NAME="Balance" ;;
          "Smooth(300hz)") HZ_VAL="300"; HZ_NAME="Smooth" ;;
          "Performance(500hz)") HZ_VAL="500"; HZ_NAME="Performance" ;;
          "Ultra(1000hz)") HZ_VAL="1000"; HZ_NAME="Ultra" ;;
          *) HZ_VAL="250"; HZ_NAME="Balance" ;;
        esac
        echo "TIMER_NAME=$HZ_NAME" >> $GITHUB_ENV
        ./scripts/config --file arch/arm64/configs/capybara_defconfig \
          --disable HZ_100 --disable HZ_125 --disable HZ_250 \
          --disable HZ_300 --disable HZ_500 --disable HZ_1000 \
          --enable HZ_$HZ_VAL --set-val HZ $HZ_VAL

    - name: Setup KowSU
      if: ${{ github.event.inputs.include_kernelsu == 'true' }}
      run: |
        curl -ls https://raw.githubusercontent.com/KOWX712/KernelSU/master/kernel/setup.sh | bash -s master
        echo "CONFIG_KSU=y" >> arch/arm64/configs/capybara_defconfig

    - name: Setup Droidspaces
      if: ${{ github.event.inputs.include_droidspaces == 'true' }}
      run: |
        chmod +x droidspaces_setup.sh
        ./droidspaces_setup.sh
    - name: Setup SUSFS
      if: ${{ github.event.inputs.include_susfs == 'true' && github.event.inputs.include_kernelsu == 'true' }}
      run: |
        chmod +x susfs_setup.sh
        chmod +x scripts/ksu_susfs_fixup.sh
        ./susfs_setup.sh
        if [ "${{ github.event.inputs.include_susfs_spoof_uname }}" == "true" ]; then
          sed -i 's/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION=\"\"/g' arch/arm64/configs/capybara_defconfig
          sed -i '$a CONFIG_KSU_SUSFS_SPOOF_UNAME=y' arch/arm64/configs/capybara_defconfig
        else
          sed -i '$a # CONFIG_KSU_SUSFS_SPOOF_UNAME is not set' arch/arm64/configs/capybara_defconfig
        fi
    - name: Build Kernel
      run: |
        export PATH=$(pwd)/../toolchains/clang/bin:$PATH
        export ARCH=arm64
        export SUBARCH=arm64
        export KBUILD_COMPILER_STRING="$(clang --version | head -n 1 | perl -pe 's/\(http.*?\)//gs' | sed -e 's/  */ /g' -e 's/[[:space:]]*$//')"
        echo "Using compiler: $KBUILD_COMPILER_STRING"
        make O=out CC=clang LLVM=1 LLVM_IAS=1 KCFLAGS="-w" capybara_defconfig
        make -j$(nproc --all) O=out CC=clang LLVM=1 LLVM_IAS=1 KCFLAGS="-w"
        
    - name: Package with AnyKernel3
      run: |
        export ZIP_NAME="Capybara-CLO-Kernel"
        if [ "${{ github.event.inputs.include_kernelsu }}" == "true" ]; then
          export ZIP_NAME="${ZIP_NAME}-KowSU"
        fi
        if [ "${{ github.event.inputs.include_droidspaces }}" == "true" ]; then
          export ZIP_NAME="${ZIP_NAME}-Droidspaces"
        fi
        if [ "${{ github.event.inputs.include_susfs }}" == "true" ] && [ "${{ github.event.inputs.include_kernelsu }}" == "true" ]; then
          export ZIP_NAME="${ZIP_NAME}-SUSFS"
        fi
        export ZIP_NAME="${ZIP_NAME}-${TIMER_NAME:-Balance}"
        echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
        cp out/arch/arm64/boot/Image anykernel/
        cd anykernel
        zip -r9 ../$ZIP_NAME.zip *
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ZIP_NAME }}
        path: ${{ env.ZIP_NAME }}.zip

    - name: Create Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ env.ZIP_NAME }}.zip
        name: Release ${{ env.ZIP_NAME }}
        tag_name: ${{ env.ZIP_NAME }}-${{ github.run_id }}
        body: "Automated build of ${{ env.ZIP_NAME }}"
